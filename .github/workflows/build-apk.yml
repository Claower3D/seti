name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'chore: auto-build apk')"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Frontend Dependencies
      working-directory: frontend
      run: npm install

    - name: Build Frontend
      working-directory: frontend
      run: npm run build
      env:
        VITE_API_URL: ${{ secrets.RAILWAY_URL }}

    - name: Sync Capacitor
      working-directory: frontend
      run: |
        chmod +x android/gradlew
        npx cap sync android

    - name: Build Android APK
      working-directory: frontend/android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Move APK to Public Folder
      run: mv frontend/android/app/build/outputs/apk/debug/app-debug.apk frontend/public/seti-app.apk

    - name: Commit and Push APK to Repository
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add frontend/public/seti-app.apk
        if ! git diff --staged --quiet; then
          git commit -m "chore: auto-build apk"
          git push
        else
          echo "No changes in APK detected, skipping commit."
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
